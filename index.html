<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Escala de Notas Pro</title>
    
    <!-- Código de Google AdSense -->
    <meta name="google-adsense-account" content="ca-pub-1422523085246086">

    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; margin: 0; padding: 0;}
            .shadow-sm, .shadow-md, .shadow-lg { box-shadow: none !important; }
            .border { border-color: #cbd5e1 !important; }
        }
        .grade-fail { color: #ef4444; font-weight: bold; }
        .grade-pass { color: #3b82f6; font-weight: bold; }
        
        @keyframes slideInUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .toast-enter { animation: slideInUp 0.3s ease-out forwards; }
        .toast-exit { animation: fadeOut 0.3s ease-in forwards; }
        
        .loader {
            border: 2px solid #f1f5f9; border-top: 2px solid #3b82f6; border-radius: 50%;
            width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 pb-10">

    <div class="max-w-6xl mx-auto px-4 py-6">
        
        <!-- ENCABEZADO Y AUTENTICACIÓN -->
        <header class="relative mb-6 no-print flex flex-col sm:flex-row items-center justify-between bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex flex-col items-center sm:items-start flex-1 w-full">
                <div class="inline-flex items-center gap-3 mb-1">
                    <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Escala de Notas</h1>
                    <span class="bg-blue-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wide shadow-sm">Pro</span>
                </div>
                <p class="text-slate-500 text-sm text-center sm:text-left">Cálculos precisos y exportación inteligente.</p>
            </div>
            
            <div class="mt-4 sm:mt-0 flex-shrink-0" id="authContainer">
                <button id="btnLogin" onclick="window.triggerGoogleLogin()" class="flex items-center gap-2 bg-white border border-slate-200 px-4 py-2 rounded-full shadow-sm hover:bg-slate-50 text-sm font-medium text-slate-700 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Iniciar Sesión
                </button>
                <div id="userProfile" class="hidden items-center gap-3 bg-white border border-slate-200 p-1.5 pr-4 rounded-full shadow-sm">
                    <img id="userAvatar" src="" class="w-8 h-8 rounded-full border border-slate-200 bg-slate-100 object-cover" alt="Avatar">
                    <span id="userName" class="text-sm font-semibold text-slate-700 max-w-[120px] truncate"></span>
                    <button onclick="window.triggerLogout()" class="text-slate-400 hover:text-red-500 ml-1 p-1 rounded-full hover:bg-slate-100 transition-colors outline-none" title="Cerrar sesión">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- ESPACIO PUBLICITARIO 1: Banner Superior -->
        <div class="w-full mb-6 no-print text-center">
            <div class="bg-slate-200/50 border border-slate-300 border-dashed rounded-xl min-h-[100px] w-full flex flex-col items-center justify-center text-slate-400 relative overflow-hidden group">
                <span class="text-[10px] uppercase tracking-wider absolute top-2 left-3 font-bold opacity-50 z-0">Publicidad</span>
                <span class="text-xs font-medium z-0 px-4">Espacio para Anuncio Horizontal (Banner Superior)</span>
                <!-- Cuando Google te apruebe, pegarás el código del anuncio aquí -->
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- PANEL LATERAL (Configuración) -->
            <aside class="lg:col-span-1 space-y-6 no-print">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-slate-800">
                        <i data-lucide="settings" class="w-5 h-5 text-blue-600"></i> Parámetros
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Puntaje Máximo</label>
                            <input type="number" id="maxPoints" value="40" min="1" step="0.5" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Exigencia (%)</label>
                            <input type="number" id="exigency" value="60" min="1" max="99" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Nota Mín</label>
                                <input type="number" id="minGrade" value="1.0" step="0.1" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Nota Máx</label>
                                <input type="number" id="maxGrade" value="7.0" step="0.1" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Nota de Aprobación</label>
                            <input type="number" id="passGrade" value="4.0" step="0.1" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <div class="pt-2 border-t border-slate-100">
                            <label class="block text-sm font-medium text-slate-700 mb-1">Curva Matemática</label>
                            <select id="curve" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50 text-sm">
                                <option value="linear2">Lineal 2 Tramos (MINEDUC)</option>
                                <option value="linear1">Lineal 1 Tramo</option>
                                <option value="log">Logarítmica</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Incremento</label>
                            <select id="increment" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50 text-sm">
                                <option value="1">Cada 1.0 puntos</option>
                                <option value="0.5">Cada 0.5 puntos</option>
                                <option value="0.25">Cada 0.25 puntos</option>
                                <option value="0.2">Cada 0.2 puntos</option>
                                <option value="0.1">Cada 0.1 puntos</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Lista de Escalas en la Nube -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-slate-800">
                        <i data-lucide="cloud" class="w-5 h-5 text-emerald-600"></i> Mis Escalas
                    </h2>
                    <ul id="savedList" class="space-y-2 text-sm max-h-[300px] overflow-y-auto pr-1">
                        <li class="text-slate-500 italic text-xs text-center py-4">Inicia sesión para cargar escalas...</li>
                    </ul>
                </div>
            </aside>

            <!-- AREA PRINCIPAL (Resultados) -->
            <main class="lg:col-span-3">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row gap-4 items-center justify-between no-print">
                    <div class="flex items-center gap-2 text-blue-800 bg-blue-50 px-4 py-2 rounded-xl border border-blue-100 w-full md:w-auto">
                        <i data-lucide="info" class="w-5 h-5 flex-shrink-0"></i>
                        <span id="summaryText" class="text-sm font-medium">Calculando...</span>
                    </div>
                    
                    <div class="flex flex-wrap gap-2 w-full md:w-auto">
                        <button onclick="window.copyLink()" class="flex-1 md:flex-none flex items-center justify-center gap-2 px-4 py-2.5 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 rounded-xl text-sm font-medium focus:ring-2 focus:ring-slate-200">
                            <i data-lucide="link" class="w-4 h-4"></i> Link
                        </button>
                        <button onclick="window.exportCSV()" class="flex-1 md:flex-none flex items-center justify-center gap-2 px-4 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-sm font-medium shadow-sm focus:ring-2 focus:ring-emerald-500">
                            <i data-lucide="file-spreadsheet" class="w-4 h-4"></i> CSV
                        </button>
                        <button id="btnPdf" onclick="window.exportPDF()" class="flex-1 md:flex-none flex items-center justify-center gap-2 px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-medium shadow-sm focus:ring-2 focus:ring-blue-500">
                            <i data-lucide="file-down" class="w-4 h-4" id="pdfIcon"></i> <span id="pdfText">PDF</span>
                        </button>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-4 sm:p-6 border-b border-slate-100 flex flex-col lg:flex-row lg:justify-between lg:items-center bg-slate-50/50 gap-4">
                        <div class="flex items-center gap-2 w-full lg:w-1/2">
                            <input type="text" id="saveName" placeholder="Nombra esta evaluación..." class="text-xl sm:text-2xl font-bold text-slate-800 bg-transparent border-b-2 border-transparent hover:border-slate-200 focus:border-blue-500 focus:outline-none transition-colors px-1 py-1 w-full placeholder:text-slate-300 truncate">
                            <button onclick="window.triggerSave()" class="text-emerald-600 hover:bg-emerald-100 bg-emerald-50 p-2.5 rounded-xl transition-colors flex-shrink-0 border border-emerald-200" title="Guardar">
                                <i data-lucide="cloud-upload" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <div class="flex items-center gap-3 self-start lg:self-auto">
                            <!-- Dropdown de Vista -->
                            <div class="relative" id="viewModeContainer">
                                <button onclick="document.getElementById('viewDropdown').classList.toggle('hidden')" class="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 rounded-xl text-sm font-medium shadow-sm focus:ring-2 focus:ring-slate-200">
                                    <i data-lucide="eye" class="w-4 h-4 text-blue-600"></i>
                                    <span id="viewText">Detallada</span>
                                    <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>
                                </button>
                                <div id="viewDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-slate-100 overflow-hidden z-20">
                                    <button onclick="window.changeView('detailed')" class="w-full text-left px-4 py-3 text-sm text-slate-700 hover:bg-blue-50 hover:text-blue-700 border-b border-slate-50">
                                        <i data-lucide="layout-list" class="w-4 h-4 inline mr-2 text-slate-400"></i> Detallada
                                    </button>
                                    <button onclick="window.changeView('compact')" class="w-full text-left px-4 py-3 text-sm text-slate-700 hover:bg-blue-50 hover:text-blue-700">
                                        <i data-lucide="grid-3x3" class="w-4 h-4 inline mr-2 text-slate-400"></i> Compacta
                                    </button>
                                </div>
                            </div>
                            <span id="curveBadge" class="text-xs bg-indigo-100 text-indigo-700 px-2.5 py-1.5 rounded font-semibold hidden sm:inline-block">Lineal</span>
                        </div>
                    </div>
                    <!-- Contenedor Principal de la Tabla -->
                    <div id="resultsContainer" class="overflow-x-auto max-h-[70vh] overflow-y-auto bg-white overscroll-contain"></div>
                </div>
            </main>
        </div>

        <!-- ESPACIO PUBLICITARIO 2: Banner Inferior -->
        <div class="w-full mt-8 no-print text-center">
            <div class="bg-slate-200/50 border border-slate-300 border-dashed rounded-xl min-h-[100px] w-full flex flex-col items-center justify-center text-slate-400 relative overflow-hidden group">
                <span class="text-[10px] uppercase tracking-wider absolute top-2 left-3 font-bold opacity-50 z-0">Publicidad</span>
                <span class="text-xs font-medium z-0 px-4">Espacio para Anuncio Horizontal (Banner Inferior)</span>
                <!-- Cuando Google te apruebe, pegarás el código del anuncio aquí -->
            </div>
        </div>

    </div>

    <!-- Toasts UI -->
    <div id="toastContainer" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- ==========================================
         SCRIPT 1: MOTOR VISUAL Y LÓGICO
         ========================================== -->
    <script>
        window.escalaState = { rows: [], viewMode: 'detailed', inputs: ['maxPoints', 'exigency', 'minGrade', 'maxGrade', 'passGrade', 'increment', 'curve'] };

        window.showToast = (msg, icon = "info", color = "blue") => {
            const container = document.getElementById('toastContainer');
            const t = document.createElement('div');
            const colors = { 'blue': 'bg-blue-600', 'emerald': 'bg-emerald-600', 'red': 'bg-red-500' };
            t.className = `flex items-center gap-2 px-4 py-3 rounded-lg shadow-lg font-medium text-sm text-white toast-enter ${colors[color]} pointer-events-auto`;
            t.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5"></i> ${msg}`;
            container.appendChild(t);
            if(window.lucide) window.lucide.createIcons();
            setTimeout(() => { t.classList.replace('toast-enter', 'toast-exit'); setTimeout(() => t.remove(), 300); }, 3000);
        };

        const calculateGrades = () => {
            let maxPts = parseFloat(document.getElementById('maxPoints').value) || 40;
            let ex = parseFloat(document.getElementById('exigency').value) || 60;
            let minG = parseFloat(document.getElementById('minGrade').value) || 1.0;
            let maxG = parseFloat(document.getElementById('maxGrade').value) || 7.0;
            let passG = parseFloat(document.getElementById('passGrade').value) || 4.0;
            const inc = parseFloat(document.getElementById('increment').value) || 1;
            const curve = document.getElementById('curve').value;

            if(maxPts <= 0) { maxPts = 1; document.getElementById('maxPoints').value = 1; }
            if(minG >= maxG) { minG = maxG - 1; document.getElementById('minGrade').value = minG; }
            if(passG <= minG || passG >= maxG) { passG = ((maxG - minG)/2)+minG; document.getElementById('passGrade').value = passG; }

            const passPts = maxPts * (ex / 100);
            document.getElementById('summaryText').innerHTML = `Aprobación en: <b>${passPts.toFixed(2)} pts</b>`;
            document.getElementById('curveBadge').innerText = document.getElementById('curve').options[document.getElementById('curve').selectedIndex].text;

            let data = [];
            if ((maxPts / inc) > 5000) { window.showToast("Escala muy grande", "alert-circle", "red"); return; }

            for (let p = maxPts; p >= 0; p -= inc) {
                p = Math.round(p * 100) / 100;
                let g = 0; const pct = maxPts > 0 ? (p / maxPts) * 100 : 0;

                if (curve === 'linear2') {
                    if (p < passPts) g = passPts > 0 ? (passG - minG) * (p / passPts) + minG : minG;
                    else g = (maxPts - passPts) > 0 ? (maxG - passG) * ((p - passPts) / (maxPts - passPts)) + passG : maxG;
                } else if (curve === 'linear1') {
                    g = maxPts > 0 ? (maxG - minG) * (p / maxPts) + minG : minG;
                } else if (curve === 'log') {
                    g = minG + (maxG - minG) * (Math.log(p + 1) / Math.log(maxPts + 1));
                }

                if (p <= 0) g = minG; if (p >= maxPts) g = maxG;
                const gRounded = Math.round(g * 10) / 10; const isPass = gRounded >= passG;
                
                data.push({ pStr: p.toString().replace('.', ','), gStr: gRounded.toFixed(1).replace('.', ','), color: isPass ? 'grade-pass' : 'grade-fail', isPass: isPass, pctR: pct.toFixed(0), pctE: pct.toFixed(2) });
            }
            window.escalaState.rows = data; renderUI();
        };

        const renderUI = () => {
            const container = document.getElementById('resultsContainer');
            const data = window.escalaState.rows;
            if(!data.length) { container.innerHTML = ''; return; }

            if (window.escalaState.viewMode === 'detailed') {
                container.innerHTML = `
                    <table class="w-full text-left min-w-[300px]">
                        <thead class="bg-slate-50 border-b border-slate-200 sticky top-0 z-10 shadow-sm">
                            <tr><th class="px-6 py-4 text-sm font-semibold text-slate-600">Puntaje</th>
                                <th class="px-6 py-4 text-sm font-semibold text-slate-600">Nota</th>
                                <th class="px-6 py-4 text-sm font-semibold text-slate-600 hidden sm:table-cell">Logro</th></tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                        ${data.map(r => `
                            <tr class="hover:bg-blue-50/50 transition-colors">
                                <td class="px-6 py-2.5 font-medium text-slate-700">${r.pStr}</td>
                                <td class="px-6 py-2.5 ${r.color} text-lg">${r.gStr}</td>
                                <td class="px-6 py-2.5 text-slate-500 hidden sm:table-cell">${r.pctR}% <span class="text-xs text-slate-400">(${r.pctE}%)</span></td>
                            </tr>`).join('')}
                        </tbody>
                    </table>`;
            } else {
                container.innerHTML = `
                    <div class="columns-1 sm:columns-2 md:columns-3 lg:columns-4 gap-x-6 p-6 text-sm">
                        ${data.map(r => `
                        <div class="break-inside-avoid flex justify-between py-1.5 px-3 border-b border-slate-200 even:bg-slate-100 rounded-sm">
                            <span class="font-medium text-slate-600">${r.pStr}</span>
                            <span class="font-bold ${r.color}">${r.gStr}</span>
                        </div>`).join('')}
                    </div>`;
            }
        };

        let timeout; const debounceCalc = () => { clearTimeout(timeout); timeout = setTimeout(calculateGrades, 150); };
        
        window.changeView = (mode) => {
            window.escalaState.viewMode = mode;
            document.getElementById('viewText').innerText = mode === 'detailed' ? 'Detallada' : 'Compacta';
            document.getElementById('viewDropdown').classList.add('hidden'); renderUI();
        };

        window.copyLink = () => {
            const params = new URLSearchParams();
            window.escalaState.inputs.forEach(id => params.set(id, document.getElementById(id).value));
            params.set('saveName', document.getElementById('saveName').value); params.set('viewMode', window.escalaState.viewMode);
            let url = window.location.origin + window.location.pathname + '?' + params.toString();
            if(url.startsWith('file://') || url.includes('null')) url = `https://mis-escalas-notas.com/?${params.toString()}`;
            const temp = document.createElement('input'); temp.value = url;
            document.body.appendChild(temp); temp.select(); document.execCommand('copy'); temp.remove();
            window.showToast("Enlace copiado", "link");
        };

        window.exportCSV = () => {
            const data = window.escalaState.rows; if(!data.length) return;
            let csv = window.escalaState.viewMode === 'detailed' 
                ? "Puntaje;Nota;Porcentaje;Porcentaje Exacto\n" + data.map(r => `${r.pStr};${r.gStr};${r.pctR}%;${r.pctE}%\n`).join('')
                : "Puntaje;Nota\n" + data.map(r => `${r.pStr};${r.gStr}\n`).join('');
            const url = URL.createObjectURL(new Blob(["\ufeff", csv], { type: 'text/csv;charset=utf-8;' }));
            const a = document.createElement("a"); a.href = url;
            a.download = (document.getElementById('saveName').value || 'Escala') + '.csv';
            a.click(); URL.revokeObjectURL(url); window.showToast("Excel exportado", "download", "emerald");
        };

        window.exportPDF = () => {
            if(!window.html2pdf) return window.showToast("La librería PDF aún está cargando", "loader", "blue");
            const data = window.escalaState.rows; if(!data.length) return;
            const btn = document.getElementById('btnPdf'); const text = document.getElementById('pdfText');
            btn.disabled = true; text.innerText = 'Procesando...';
            const name = document.getElementById('saveName').value || 'Escala de Notas';
            
            let html = `<div style="padding:20px; font-family:sans-serif; color:#0f172a; background:white;">
                <h1 style="font-size:22px; font-weight:bold; margin-bottom:16px; text-align:center;">${name}</h1>
                <div style="display:flex; justify-content:space-between; border-bottom:2px solid #1e293b; padding-bottom:12px; margin-bottom:20px; font-size:13px; font-weight:bold;">
                    <span>Max: ${document.getElementById('maxPoints').value} pts</span>
                    <span>Exigencia: ${document.getElementById('exigency').value}%</span>
                </div>`;

            if (window.escalaState.viewMode === 'detailed') {
                html += `<table style="width:100%; border-collapse:collapse; font-size:12px; text-align:left;">
                    <tr style="background:#f8fafc; border-bottom:2px solid #cbd5e1;"><th style="padding:8px;">Pts</th><th style="padding:8px;">Nota</th><th style="padding:8px;">Logro</th></tr>
                    ${data.map((r,i) => `<tr style="background:${i%2===0?'#fff':'#f8fafc'}; border-bottom:1px solid #e2e8f0;">
                        <td style="padding:8px; font-weight:500;">${r.pStr}</td>
                        <td style="padding:8px; font-weight:bold; color:${r.isPass?'#0f172a':'#dc2626'};">${r.gStr}</td>
                        <td style="padding:8px; color:#64748b;">${r.pctR}%</td>
                    </tr>`).join('')}</table>`;
            } else {
                const cols = data.length > 80 ? 5 : (data.length > 40 ? 4 : 3);
                const rPc = Math.ceil(data.length / cols);
                html += `<table style="width:100%; border-collapse:separate; border-spacing:8px 0; font-size:11px;"><tbody>`;
                for (let r = 0; r < rPc; r++) {
                    html += `<tr>`;
                    for (let c = 0; c < cols; c++) {
                        const row = data[c * rPc + r];
                        if (row) {
                            html += `<td style="padding:4px; border-bottom:1px solid #e2e8f0; background:${r%2===0?'#f8fafc':'#fff'}; width:${100/cols}%; vertical-align:top;">
                                <div style="display:flex; justify-content:space-between;"><span style="color:#475569;">${row.pStr}</span><span style="font-weight:bold; color:${row.isPass?'#0f172a':'#dc2626'};">${row.gStr}</span></div></td>`;
                        } else html += `<td></td>`;
                    }
                    html += `</tr>`;
                }
                html += `</tbody></table>`;
            }
            html += `</div>`;
            html2pdf().set({ margin: 10, filename: name+'.pdf', jsPDF: { format: 'a4' } }).from(html).save().then(() => {
                btn.disabled = false; text.innerText = 'PDF'; window.showToast("PDF descargado", "check", "emerald");
            });
        };

        window.triggerSave = () => window.showToast("Conectando a la nube...", "loader", "blue");
        window.triggerGoogleLogin = () => window.showToast("Cargando servicios de Google...", "loader", "blue");
        window.triggerLogout = () => {};

        window.addEventListener('DOMContentLoaded', () => {
            if(window.lucide) window.lucide.createIcons();
            window.escalaState.inputs.forEach(id => document.getElementById(id).addEventListener('input', debounceCalc));
            document.addEventListener('click', e => { if(!document.getElementById('viewModeContainer').contains(e.target)) document.getElementById('viewDropdown').classList.add('hidden'); });
            calculateGrades();
        });
    </script>

    <script type="module">

        import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Tus llaves de Firebase (No modificar)
        const firebaseConfig = {
            apiKey: "AIzaSyD7YzBE3MLZgUFCr4r_BSatfFAZKV_LJz4",
            authDomain: "escala-de-notas-3acdd.firebaseapp.com",
            projectId: "escala-de-notas-3acdd",
            storageBucket: "escala-de-notas-3acdd.firebasestorage.app",
            messagingSenderId: "804335543155",
            appId: "1:804335543155:web:8d8fdfa1633852b577db06",
            measurementId: "G-BE7RE7H53X"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app); 
            const db = getFirestore(app);

            const initCloud = async () => {
                try {
                    await auth.authStateReady(); 
                    if (!auth.currentUser) await signInAnonymously(auth);
                } catch(e) {}
            };
            initCloud();

            onAuthStateChanged(auth, (user) => {
                if(user) {
                    if (!user.isAnonymous) {
                        document.getElementById('btnLogin').classList.add('hidden');
                        document.getElementById('userProfile').classList.remove('hidden'); document.getElementById('userProfile').classList.add('flex');
                        document.getElementById('userName').innerText = user.displayName || 'Docente';
                        document.getElementById('userAvatar').src = user.photoURL || '';
                    } else {
                        document.getElementById('btnLogin').classList.remove('hidden');
                        document.getElementById('userProfile').classList.add('hidden');
                    }
                    
                    const colRef = collection(db, 'artifacts', 'escala-web', 'users', user.uid, 'escalas');
                    onSnapshot(colRef, (snap) => {
                        const list = document.getElementById('savedList');
                        if (snap.empty) return list.innerHTML = `<li class="text-slate-500 italic text-xs text-center py-4">Aún no hay escalas en la nube.</li>`;
                        
                        list.innerHTML = '';
                        snap.forEach(docSnap => {
                            const k = docSnap.id; const data = docSnap.data();
                            const li = document.createElement('li'); li.className = "flex justify-between items-center bg-slate-50 p-2 rounded border border-slate-100 group";
                            li.innerHTML = `<button class="text-slate-700 font-medium text-left truncate flex-grow text-sm">${k}</button>
                                            <button class="text-red-400 hover:text-red-600 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`;
                            li.children[0].onclick = () => {
                                window.escalaState.inputs.forEach(id => { if(data[id]) document.getElementById(id).value = data[id]; });
                                document.getElementById('saveName').value = k; window.changeView(data.viewMode || 'detailed');
                                document.getElementById('maxPoints').dispatchEvent(new Event('input'));
                            };
                            li.children[1].onclick = () => deleteDoc(doc(db, 'artifacts', 'escala-web', 'users', user.uid, 'escalas', k));
                            list.appendChild(li);
                        });
                        if(window.lucide) window.lucide.createIcons();
                    });
                }
            });

            window.triggerGoogleLogin = async () => {
                try { await signInWithPopup(auth, new GoogleAuthProvider()); window.showToast("Conectado a la Nube", "check", "emerald"); } 
                catch(e) { window.showToast("Debes subir la página a internet para iniciar sesión.", "alert-triangle", "red"); }
            };

            window.triggerLogout = async () => { await signOut(auth); await signInAnonymously(auth); window.showToast("Sesión cerrada", "info", "blue"); };

            window.triggerSave = async () => {
                const name = document.getElementById('saveName').value.trim();
                if(!name) return window.showToast("Ponle un nombre primero", "alert-circle", "red");
                let obj = { viewMode: window.escalaState.viewMode, timestamp: new Date().toISOString() }; 
                window.escalaState.inputs.forEach(id => obj[id] = document.getElementById(id).value);
                try {
                    await setDoc(doc(db, 'artifacts', 'escala-web', 'users', auth.currentUser.uid, 'escalas', name), obj);
                    window.showToast("Sincronizado en la nube", "cloud-check", "emerald");
                } catch(e) { window.showToast("Fallo de red", "alert-circle", "red"); }
            };
        } catch (e) {
            console.error("Error Firebase", e);
        }
    </script>
